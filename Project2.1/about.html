<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Binary Misfits</title>
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Oleo+Script:wght@400;700&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ed6caf72a6.js" crossorigin="anonymous"></script>
</head>
<body class="orbitron">
    <nav id="headernav" class="navbar navbar-expand-md">
        <div class="container-fluid d-flex flex-wrap">
            <a class="navbar-brand ms-s-5 ms-xs-5 ms-lg-5" href="#">
                <h1 class="visible" id="logo1">BInary</h1>
                <h2 class="visible" id="logo2">Misfits</h2>
                <h1 class="hidden" id="logo1">B</h1>
                <h2 class="hidden" id="logo2">M</h2>
            </a>
            <button class="navbar-toggler me-sm-5 me-xs-5" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">
                        <span id="green">B</span>M
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav ms-auto me-lg-5">
                        <li class="nav-item">
                            <a class="nav-link" id="nav-link" aria-current="page" href="#">HOME</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="nav-link" href="#">ABOUT</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="nav-link" href="#">ACHIEVEMENTS</a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="hr ms-5 me-5"></div>
        </div>
    </nav>

    <div class="container-fluid" id="content">
        <img src="./images/bg13.jpg" id="lg-img" class="visible">
        <img src="./images/bg12.jpg" id="md-img" class="hidden">
        <div class=" position-absolute" id="meet">
            <span id="head">
                Meet <span style="color: white;">us!</span>
            </span><br>
            <span id="info">
                Explore our roster to find out what we can do for you!
            </span>
        </div>
        <div class="position-absolute" id="roster">
            <div id="item" class="item1"></div>
            <div id="item" class="item2"></div>
            <div id="item" class="item3"></div>
            <div id="item" class="item4"></div>
            <div id="item" class="item5"></div>
        </div>
    </div>

    <footer>
        <div class="container d-flex flex-column  justify-content-center align-items-center" id="footer">
            <div id="icons" class="align-self-center">
                <a href=""><i class="fa-brands fa-instagram"></i></a>
                <a href=""><i class="fa-brands fa-linkedin-in"></i></a>
                <a href=""><i class="fa-brands fa-github"></i></a>
            </div>
            <div id="copy">
                &copy; 2024 by <span id="green">Binary Misfits</span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
